services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: drama-agent-api
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: drama-agent-web
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
