name: drama-agent-studio-dev

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: drama-agent-api
    environment:
      PROJECT_ROOT: /workspace
      STORAGE_PATH: /workspace/storage
      STORAGE_DIR: /workspace/storage
      OPENREEL_SKILLS_DIR: /workspace/skills
    volumes:
      - ./data:/workspace/data
      - ./storage:/workspace/storage
      - ./assets:/workspace/assets
      - ./config:/workspace/config
      - ./plugins:/workspace/plugins
      - ./skills:/workspace/skills
      - ./workflow_templates:/workspace/workflow_templates
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: drama-agent-web
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  promo:
    build:
      context: .
      dockerfile: promo/Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /promo
    container_name: openreel-promo
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3001
    ports:
      - "3001:3001"
    restart: unless-stopped
