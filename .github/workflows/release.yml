name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            os: windows-latest
            command: pnpm desktop:package:win
          - target: linux
            os: ubuntu-latest
            command: pnpm desktop:package:linux
          - target: macos
            os: macos-latest
            command: pnpm desktop:package:mac

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot libarchive-tools rpm

      - name: Build desktop package
        run: ${{ matrix.command }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: openreel-studio-${{ matrix.target }}
          path: |
            dist/installers/*.exe
            dist/installers/*.dmg
            dist/installers/*.zip
            dist/installers/*.AppImage
            dist/installers/*.deb
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
          \) -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found." >&2
            exit 1
          fi
          notes="Automated OpenReel Studio desktop release for ${TAG}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" "${files[@]}" --title "OpenReel Studio ${TAG}" --notes "$notes"
